<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlantCare Predictor</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <h1>PlantCare Disease Predictor</h1>
      <p class="subtitle">Upload a leaf image and get a model prediction.</p>

      <form id="predict-form" class="card">
        <label for="image-input">Leaf Image</label>
        <input id="image-input" name="image" type="file" accept="image/*" required />
        <button type="submit">Predict</button>
      </form>

      <section id="result" class="card hidden" aria-live="polite">
        <h2>Result</h2>
        <p><strong>Prediction:</strong> <span id="prediction-text"></span></p>
        <p><strong>Confidence:</strong> <span id="confidence-text"></span></p>
      </section>

      <p id="error" class="error"></p>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
