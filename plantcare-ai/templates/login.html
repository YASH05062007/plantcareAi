<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PlantCare AI</title>
    <style>
        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e0efeb 0%, #c4e4d5 100%);
            color: #2c3e35;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #1e5c3b;
            margin-bottom: 5px;
            font-size: 2rem;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #c4e4d5;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #2c7a51;
            box-shadow: 0 0 0 3px rgba(44, 122, 81, 0.2);
        }
        .submit-btn {
            width: 100%;
            background-color: #2c7a51;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(44, 122, 81, 0.2);
        }
        .submit-btn:hover {
            background-color: #1e5c3b;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(44, 122, 81, 0.3);
        }
        .flash-messages {
            list-style-type: none;
            padding: 0;
            margin-bottom: 20px;
        }
        .flash-message {
            background-color: #fde8e8;
            color: #c81e1e;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            border: 1px solid #f8b4b4;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>PlantCare AI 🌱</h1>
    <p>Sign in to start diagnosing your plants</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul class="flash-messages">
        {% for message in messages %}
          <li class="flash-message">{{ message }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form action="/login" method="post">
        <div class="form-group">
            <label for="contact">Email Address or Phone Number</label>
            <input type="text" id="contact" name="contact" placeholder="e.g. user@example.com" required autofocus>
        </div>
        <button type="submit" class="submit-btn">Login / Sign Up</button>
    </form>
</div>

</body>
</html>
